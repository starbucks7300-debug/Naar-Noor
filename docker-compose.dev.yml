# Development compose file with hot reload and additional tooling
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# Naming: naar-noor-dev-{service}

services:
  naar-noor-dev-web:
    build:
      context: ./naar-noor
      dockerfile: Dockerfile
    container_name: naar-noor-dev-web
    hostname: naar-noor-dev-web
    volumes:
      # Enable live reloading for development
      - ./naar-noor/src:/app/src
      - ./naar-noor/angular.json:/app/angular.json:ro
      - ./naar-noor/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ./naar-noor/tailwind.config.js:/app/tailwind.config.js:ro
      - ./naar-noor/karma.conf.js:/app/karma.conf.js:ro
    environment:
      - NODE_ENV=development
      - API_URL=http://naar-noor-dev-api:80/api
    ports:
      - "80:80"
      - "4200:4200"  # Angular dev server
    command: npm run dev
    labels:
      com.naar-noor.service: "web"
      com.naar-noor.environment: "development"
      com.naar-noor.description: "Frontend web server (hot reload)"

  naar-noor-dev-api:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: naar-noor-dev-api
    hostname: naar-noor-dev-api
    volumes:
      # Enable live reloading for development
      - ./api-server/src:/app/src:ro
      - ./api-server/tests:/app/tests:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - POSTGRESQL_CONNECTION_STRING=Host=naar-noor-dev-database;Port=5432;Database=postgres;User Id=postgres;Password=${PGPASSWORD:-dev_password_change_me};SSL Mode=Disable
      - Supabase__Url=${SUPABASE_URL:-http://localhost:54321}
      - Supabase__AnonKey=${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24ifQ.625_WdcF3KHqz5amU0x2KfUqKS4FTO2p9PsrqjIjxQA}
      - Supabase__ServiceRoleKey=${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSJ9.DaYlG6CDqKs0V8Z-LTUItzjhck01OMc3IrapzP-kiGI}
    ports:
      - "8080:80"
      - "7000:7000"  # Debug port
    depends_on:
      naar-noor-dev-database:
        condition: service_healthy
    command: dotnet watch run --project src/NaarNoor.API
    networks:
      - naar-noor-dev-network
    labels:
      com.naar-noor.service: "api"
      com.naar-noor.environment: "development"
      com.naar-noor.description: "Backend API server (hot reload)"

  naar-noor-dev-database:
    image: postgres:16-alpine
    container_name: naar-noor-dev-database
    hostname: naar-noor-dev-database
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${PGPASSWORD:-dev_password_change_me}
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - naar-noor-dev-database-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      com.naar-noor.service: "database"
      com.naar-noor.environment: "development"
      com.naar-noor.description: "PostgreSQL database (development)"

  # Adminer - Database management UI for development
  naar-noor-dev-adminer:
    image: adminer:latest
    container_name: naar-noor-dev-adminer
    hostname: naar-noor-dev-adminer
    ports:
      - "8081:8080"
    depends_on:
      naar-noor-dev-database:
        condition: service_healthy
    networks:
      - naar-noor-dev-network
    restart: unless-stopped
    labels:
      com.naar-noor.service: "adminer"
      com.naar-noor.environment: "development"
      com.naar-noor.description: "Database management UI (PostgreSQL)"

networks:
  naar-noor-dev-network:
    name: naar-noor-dev-network
    driver: bridge
    labels:
      com.naar-noor.network: "development"

volumes:
  naar-noor-dev-database-data:
    driver: local
    labels:
      com.naar-noor.volume: "database-data"
      com.naar-noor.environment: "development"
