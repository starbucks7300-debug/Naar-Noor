name: Integration Tests

# Triggers on push and PR, but prioritizes integration test categories
on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  # Backend Integration Tests - Database and cross-layer tests
  backend-integration-tests:
    name: Backend - Integration Tests (.NET)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # PostgreSQL for integration testing
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: TestPassword123!
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore api-server/NaarNoor.sln

      - name: Build projects
        run: dotnet build api-server/NaarNoor.sln --no-restore --configuration Release

      # Run only integration tests (marked with Category=IntegrationTest)
      - name: Run integration tests
        run: dotnet test api-server/NaarNoor.sln --filter "Category=IntegrationTest" --no-build --configuration Release --logger:"console;verbosity=normal" --logger:"trx;LogFileName=integration-tests.trx" --results-directory:./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-test-results
          path: test-results/**/*.trx
          retention-days: 30
          if-no-files-found: ignore

  # Frontend E2E Tests - Cypress end-to-end scenarios
  frontend-e2e-tests:
    name: Frontend - E2E Tests (Cypress)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'naar-noor/package-lock.json'

      - name: Install dependencies
        run: npm ci --include=dev
        working-directory: naar-noor
        env:
          NODE_ENV: development

      - name: Start frontend dev server
        run: npm run dev &
        working-directory: naar-noor

      - name: Wait for frontend to be ready
        run: npx wait-on http://localhost:5000 --timeout 120000
        working-directory: naar-noor

      - name: Run Cypress E2E tests
        run: npm run e2e:ci
        working-directory: naar-noor
        env:
          CYPRESS_BASE_URL: http://localhost:5000

      - name: Upload Cypress screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: naar-noor/cypress/screenshots/**/*
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: naar-noor/cypress/videos/**/*
          retention-days: 30
          if-no-files-found: ignore
