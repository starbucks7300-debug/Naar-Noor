---
# Frontend Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: naar-noor-frontend
  namespace: naar-noor
  labels:
    app: naar-noor
    component: frontend

---
# Backend Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: naar-noor-backend
  namespace: naar-noor
  labels:
    app: naar-noor
    component: backend

---
# Database Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: naar-noor-database
  namespace: naar-noor
  labels:
    app: naar-noor
    component: database

---
# Frontend Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: naar-noor-frontend
  namespace: naar-noor
  labels:
    app: naar-noor
    component: frontend
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]

---
# Frontend RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: naar-noor-frontend
  namespace: naar-noor
  labels:
    app: naar-noor
    component: frontend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: naar-noor-frontend
subjects:
- kind: ServiceAccount
  name: naar-noor-frontend
  namespace: naar-noor

---
# Backend Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: naar-noor-backend
  namespace: naar-noor
  labels:
    app: naar-noor
    component: backend
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]

---
# Backend RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: naar-noor-backend
  namespace: naar-noor
  labels:
    app: naar-noor
    component: backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: naar-noor-backend
subjects:
- kind: ServiceAccount
  name: naar-noor-backend
  namespace: naar-noor
