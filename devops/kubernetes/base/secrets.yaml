apiVersion: v1
kind: Secret
metadata:
  name: naar-noor-db-secret
  namespace: naar-noor
  labels:
    app: naar-noor
    component: database
type: Opaque
stringData:
  # Supabase PostgreSQL connection string
  # Replace SUPABASE_HOST, SUPABASE_DB_PASSWORD with real values (injected via CI/Terraform)
  connection-string: "Host=SUPABASE_HOST;Port=5432;Database=postgres;User Id=postgres;Password=SUPABASE_DB_PASSWORD;Ssl Mode=Require;"
  # For self-hosted MSSQL (alternative deployment mode only):
  # sa-password: "REPLACE_ME"
  # connection-string: "Server=naar-noor-database;Database=dbname;User Id=sa;Password=REPLACE_ME;Encrypt=False;TrustServerCertificate=True;MultipleActiveResultSets=True;"
---
apiVersion: v1
kind: Secret
metadata:
  name: naar-noor-docker-registry
  namespace: naar-noor
  labels:
    app: naar-noor
# Correct type for modern Docker config format (dockercfg type is legacy and unsupported)
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "auth": "REPLACE_WITH_BASE64_GITHUB_TOKEN"
        }
      }
    }
