kind = "web"
previewPath = "/"
title = "Naar & Noor"
version = "1.0.0"
id = "artifacts/naar-noor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24790

[services.development]
run = "pnpm --filter @workspace/naar-noor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/naar-noor", "run", "build" ]
publicDir = "artifacts/naar-noor/dist/lost-yeti/browser"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24790"
