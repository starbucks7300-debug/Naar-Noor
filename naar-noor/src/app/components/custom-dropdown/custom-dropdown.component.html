<div class="relative">
  <button 
    type="button"
    (click)="toggleDropdown()"
    class="w-full bg-[#0a0a0a] border border-white/10 rounded-xl px-4 py-3 text-sm text-white text-left hover:border-[#C65A1E] focus:outline-none focus:border-[#C65A1E] focus:ring-1 focus:ring-[#C65A1E] transition-all flex items-center justify-between">
    <span [class.text-neutral-600]="!selectedValue">{{ getDisplayValue() }}</span>
    <iconify-icon 
      [attr.icon]="icon" 
      width="18" 
      class="text-neutral-500 transition-transform duration-200"
      [class.rotate-180]="isOpen"></iconify-icon>
  </button>

  <div 
    *ngIf="isOpen"
    class="absolute top-full left-0 w-full bg-[#111] border border-white/10 rounded-xl shadow-2xl z-[100] max-h-60 overflow-y-auto animate-fade-in custom-scrollbar">
    <button
      type="button"
      *ngFor="let option of options"
      (click)="selectOption(option)"
      [ngClass]="{
        'bg-[#C65A1E]/20 text-[#C65A1E]': option === selectedValue
      }"
      class="w-full px-4 py-2.5 text-sm text-left text-neutral-300 hover:bg-white/5 hover:text-white transition-all flex items-center justify-between">
      <span>{{ option }}</span>
      <iconify-icon 
        *ngIf="option === selectedValue"
        icon="solar:check-circle-bold" 
        width="18" 
        class="text-[#C65A1E]"></iconify-icon>
    </button>
  </div>

  <div 
    *ngIf="isOpen"
    (click)="toggleDropdown()"
    class="fixed inset-0 z-[90]"></div>
</div>
