<div class="relative">
  <button 
    type="button"
    (click)="toggleCalendar()"
    class="w-full bg-[#0a0a0a] border border-white/10 rounded-xl px-4 py-3 text-sm text-white text-left hover:border-[#C65A1E] focus:outline-none focus:border-[#C65A1E] focus:ring-1 focus:ring-[#C65A1E] transition-all flex items-center justify-between">
    <span [class.text-neutral-600]="!selectedDate">{{ getFormattedDate() }}</span>
    <iconify-icon icon="solar:calendar-linear" width="18" class="text-neutral-500"></iconify-icon>
  </button>

  <div 
    *ngIf="isOpen"
    class="absolute top-full left-0 w-full md:w-80 bg-[#111] border border-white/10 rounded-xl shadow-2xl z-[100] p-4 animate-fade-in">
    
    <div class="flex items-center justify-between mb-4">
      <button 
        type="button"
        (click)="previousMonth()"
        class="p-2 hover:bg-white/5 rounded-lg transition-colors">
        <iconify-icon icon="solar:alt-arrow-left-linear" width="20" class="text-white"></iconify-icon>
      </button>
      
      <h3 class="font-['Forum'] text-lg text-white">
        {{ monthNames[currentMonth.getMonth()] }} {{ currentMonth.getFullYear() }}
      </h3>
      
      <button 
        type="button"
        (click)="nextMonth()"
        class="p-2 hover:bg-white/5 rounded-lg transition-colors">
        <iconify-icon icon="solar:alt-arrow-right-linear" width="20" class="text-white"></iconify-icon>
      </button>
    </div>

    <div class="grid grid-cols-7 gap-1 mb-2">
      <div 
        *ngFor="let day of dayNames"
        class="text-center text-xs text-neutral-500 font-medium py-2">
        {{ day }}
      </div>
    </div>

    <div class="grid grid-cols-7 gap-1">
      <ng-container *ngFor="let week of weeks">
        <button
          type="button"
          *ngFor="let date of week"
          (click)="selectDate(date)"
          [disabled]="!date || isPastDate(date)"
          [ngClass]="{
            'opacity-0': !date,
            'opacity-40 cursor-not-allowed text-neutral-600': date && isPastDate(date),
            'bg-[#C65A1E] text-white font-semibold': isSelected(date),
            'ring-2 ring-[#C65A1E]/50 text-white font-medium': isToday(date) && !isSelected(date),
            'text-white hover:text-white hover:bg-white/10': date && !isSelected(date) && !isPastDate(date)
          }"
          class="aspect-square flex items-center justify-center text-sm rounded-lg transition-all disabled:hover:bg-transparent">
          {{ date ? date.getDate() : '' }}
        </button>
      </ng-container>
    </div>

    <button 
      type="button"
      (click)="selectToday()"
      class="w-full mt-4 px-4 py-2 text-xs text-[#C65A1E] border border-[#C65A1E]/30 rounded-lg hover:bg-[#C65A1E]/10 transition-all">
      Today
    </button>
  </div>

  <div 
    *ngIf="isOpen"
    (click)="toggleCalendar()"
    class="fixed inset-0 z-[90]"></div>
</div>
