<!-- Animated gradient background with particles effect -->
<div class="fixed top-0 left-0 w-full h-full overflow-hidden" [ngClass]="zIndex">
  <!-- Animated gradient layers -->
  <div class="absolute inset-0 bg-gradient-to-br from-[#0a0a0a] via-[#1a0f0a] to-[#0a0a0a] animate-gradient"></div>
  <div class="absolute inset-0 bg-gradient-to-tl from-[#0a0a0a] via-[#1a0a0f] to-[#0a0a0a] animate-gradient-slow"></div>
  
  <!-- Floating orbs -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-[#C65A1E] rounded-full filter blur-[32px] opacity-10 animate-float"></div>
  <div class="absolute top-1/3 right-1/4 w-96 h-96 bg-[#8B4513] rounded-full filter blur-[32px] opacity-10 animate-float-delayed"></div>
  <div class="absolute bottom-1/4 left-1/3 w-96 h-96 bg-[#C65A1E] rounded-full filter blur-[32px] opacity-10 animate-float-slow"></div>
  
  <!-- Noise texture overlay -->
  <div class="absolute inset-0 opacity-[0.015]" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 400 400%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>
</div>
