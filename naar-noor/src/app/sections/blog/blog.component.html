<section id="blog" class="py-6 px-6">
  <div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-6">
      <div>
        <span class="text-[#C65A1E] text-xs font-medium tracking-[0.2em] uppercase mb-2 block">Journal</span>
        <h2 class="font-['Forum'] text-4xl md:text-5xl text-white tracking-tight drop-shadow-[0_2px_8px_rgba(0,0,0,0.5)]">Stories From The Fire</h2>
      </div>
      <a href="#" class="text-sm text-white hover:text-[#C65A1E] transition-colors flex items-center gap-2 pb-2">
        View All Posts 
        <iconify-icon icon="solar:arrow-right-linear"></iconify-icon>
      </a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <a *ngFor="let post of posts" href="#" class="group block rounded-2xl bg-[#111] border border-white/5 overflow-hidden hover:border-white/10 transition-colors">
        <div class="aspect-[16/10] overflow-hidden">
          <img 
            [src]="post.image" 
            [alt]="post.title"
            loading="lazy"
            class="w-full h-full object-cover opacity-80 group-hover:scale-105 group-hover:opacity-100 transition-all duration-700">
        </div>
        <div class="p-6">
          <span class="text-xs text-neutral-400 mb-3 block">{{ post.date }}</span>
          <h3 class="font-['Forum'] text-xl text-white tracking-tight mb-3 group-hover:text-[#C65A1E] transition-colors">
            {{ post.title }}
          </h3>
          <p class="text-sm text-neutral-200 font-light mb-6 line-clamp-2">{{ post.excerpt }}</p>
          <span class="text-xs font-medium text-white group-hover:text-[#C65A1E] transition-colors flex items-center gap-1.5 uppercase tracking-wider">
            Read More 
            <iconify-icon icon="solar:arrow-right-linear"></iconify-icon>
          </span>
        </div>
      </a>
    </div>
  </div>
</section>
