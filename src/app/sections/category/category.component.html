<section class="py-6 px-6">
  <div class="max-w-7xl mx-auto">
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
      <a 
        *ngFor="let category of categories" 
        href="#menu" 
        class="group relative aspect-square rounded-2xl overflow-hidden block">
        <img 
          [src]="category.image" 
          [alt]="category.title"
          loading="lazy"
          class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-60">
        <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-[#0a0a0a]/40 to-transparent"></div>
        <div class="absolute inset-0 p-6 flex flex-col justify-end">
          <h3 class="font-['Forum'] text-xl md:text-2xl text-white tracking-tight">{{ category.title }}</h3>
        </div>
      </a>
    </div>
  </div>
</section>
