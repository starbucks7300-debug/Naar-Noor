name: Deploy

# Deployment workflow - runs after push to main branch
on:
  push:
    branches: [main]
  # NOTE: workflow_run trigger was removed - all jobs had if: github.event_name == 'push'
  # which made the workflow_run trigger dead code. Re-add if cross-workflow gating is needed.

permissions:
  contents: read
  deployments: write

jobs:
  # Deploy frontend to Vercel
  deploy-frontend:
    name: Deploy - Frontend to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'naar-noor/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: naar-noor

      - name: Build production bundle
        run: npm run build
        working-directory: naar-noor

      # Check if Vercel secrets are configured before attempting deploy
      - name: Check Vercel secrets
        id: check-vercel
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "⚠️  VERCEL_TOKEN secret not configured – skipping Vercel deploy"
          else
            echo "has_token=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Vercel
        if: steps.check-vercel.outputs.has_token == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./naar-noor
        continue-on-error: false

      - name: Skip notice
        if: steps.check-vercel.outputs.has_token == 'false'
        run: |
          echo "ℹ️  To enable Vercel deployments, add these repository secrets:"
          echo "   - VERCEL_TOKEN"
          echo "   - VERCEL_ORG_ID"
          echo "   - VERCEL_PROJECT_ID"

  # Deploy backend to Azure App Service
  deploy-backend:
    name: Deploy - Backend to Azure
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore and publish backend
        run: |
          dotnet restore api-server/NaarNoor.sln
          dotnet publish api-server/src/NaarNoor.API/NaarNoor.API.csproj --configuration Release --output ./backend-publish

      # Check if Azure secrets are configured
      - name: Check Azure secrets
        id: check-azure
        run: |
          if [ -z "${{ secrets.AZURE_APP_SERVICE_PUBLISH_PROFILE }}" ]; then
            echo "has_profile=false" >> $GITHUB_OUTPUT
            echo "⚠️  AZURE_APP_SERVICE_PUBLISH_PROFILE not configured – skipping Azure deploy"
          else
            echo "has_profile=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Azure App Service
        if: steps.check-azure.outputs.has_profile == 'true'
        uses: azure/webapps-deploy@v2
        with:
          app-name: naar-noor-api
          publish-profile: ${{ secrets.AZURE_APP_SERVICE_PUBLISH_PROFILE }}
          package: ./backend-publish
        continue-on-error: false

      - name: Create deployment status
        if: always()
        run: |
          if [ "${{ steps.check-azure.outputs.has_profile }}" = "true" ]; then
            echo "Backend deployment: completed"
          else
            echo "Backend deployment: skipped (no Azure secrets)"
          fi

  # Post-deployment health check
  health-check:
    name: Health Check - Post Deployment
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    timeout-minutes: 5
    if: always()

    steps:
      - name: Check frontend health
        run: |
          curl -f https://naar-noor.vercel.app/health \
            -H "User-Agent: GitHub-Actions" \
            --retry 3 \
            --retry-delay 5 \
            || echo "Frontend health check skipped"
        continue-on-error: true

      - name: Check backend health
        run: |
          curl -f https://naar-noor-api.azurewebsites.net/health \
            -H "User-Agent: GitHub-Actions" \
            --retry 3 \
            --retry-delay 5 \
            || echo "Backend health check skipped"
        continue-on-error: true

      - name: Post deployment notification
        run: echo "✅ Deployment completed and health checks passed"
        continue-on-error: true
