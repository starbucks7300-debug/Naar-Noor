name: Auto Update Sitemap

on:
  push:
    branches:
      - main
    paths:
      - 'src/app/app.routes.ts'
      - 'src/app/**/*.component.ts'
  workflow_dispatch:

jobs:
  update-sitemap:
    name: Update Sitemap.xml
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Extract routes
        id: routes
        run: |
          # Extract routes from app.routes.ts
          if [ -f "src/app/app.routes.ts" ]; then
            echo "Routes file found"
            # This is a placeholder - actual implementation would parse the routes file
          fi
      
      - name: Update sitemap.xml
        run: |
          node .github/scripts/update-sitemap.js
      
      - name: Validate sitemap
        run: |
          # Check if sitemap is valid XML
          if command -v xmllint &> /dev/null; then
            xmllint --noout src/sitemap.xml && echo "✅ Sitemap is valid XML"
          else
            echo "⚠️  xmllint not available, skipping validation"
          fi
      
      - name: Commit sitemap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update sitemap.xml [skip ci]"
          file_pattern: "src/sitemap.xml"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
